<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SN Tecnologia - Cadastro de Clientes</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header>
      <img
        src="../img/ChatGPT Image 23 de abr. de 2026, 13_45_05.png"
        alt="SN Tecnologia"
        width="100px"
      />
      <h1 id="main-title">SN Tecnologia Ltda.</h1>
      <h3>Gestão de Clientes</h3>
    </header>
    <nav>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
      </ul>
    </nav>
    <main>
      <h2>Cadastro de novos clientes</h2>
      <form action="">
        <label for="nome">Nome completo:</label>
        <input
          type="text"
          id="nome"
          name="nome"
          required
          placeholder="Digite seu nome completo"
        />
        <br />

        <label for="cpf">CPF:</label>
        <input
          type="text"
          id="cpf"
          name="cpf"
          required
          placeholder="Digite seu CPF"
          maxlength="14"
        />
        <br />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="Digite seu email"
        />
        <br />

        <label for="telefone">Telefone:</label>
        <input
          type="tel"
          id="telefone"
          name="telefone"
          required
          placeholder="Digite seu telefone"
        />
        <br />

        <button type="submit">Cadastrar</button>
      </form>
    </main>
    <footer>
      <p>&copy; 2026 SN Tecnologia Ltda. - Contato: sntechnologia@gmail.com</p>
    </footer>
  </body>
</html>
