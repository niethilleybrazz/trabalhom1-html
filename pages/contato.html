<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SN Tecnologia - Contato</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header>
      <img src="../img/ChatGPT Image 23 de abr. de 2026, 13_45_05.png" alt="SN Tecnologia" width="100px"/>
      <h1 id="main-title">SN Tecnologia Ltda.</h1>
      <h3>Fale Conosco</h3>
    </header>

    <nav>
      <ul class="nav-links">
        <li><a href="../index.html">Voltar para Home</a></li>
      </ul>
    </nav>

    <main>
      <h2>Entre em contato</h2>
      
    <p>
        Tem alguma dúvida, sugestão ou precisa de suporte técnico? Preencha o
        formulário abaixo e nossa equipe entrará em contato o mais breve
        possível.
      </p>

      <form action="">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required/> <br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required/> <br>

        <label for="assunto">Assunto:</label>
        <select id="assunto" name="assunto" required>
          <option value="">Selecione um assunto</option>
          <option value="suporte">Suporte Técnico</option>
          <option value="vendas">Vendas e Orçamentos</option>
          <option value="parceria">Parcerias</option>
          <option value="outro">Outro</option>
        </select> <br>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem"name="mensagem" rows="5" placeholder="Digite sua mensagem aqui..."required></textarea> <br>

        <button type="submit">Enviar Mensagem</button>
      </form>
    </main>
    <footer>
      <p>&copy; 2026 SN Tecnologia Ltda. - Contato: sntechnologia@gmail.com</p>
    </footer>
  </body>
</html>
