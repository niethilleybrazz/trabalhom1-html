<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SN Tecnologia - Cadastro de Fornecedores</title>
    <link rel="stylesheet" href="../style.css" />
</head>
<body>
    <header>
        <img src="../img/ChatGPT Image 23 de abr. de 2026, 13_45_05.png" alt="SN Tecnologia" width="100">
        <h1 id="main-title">SN Tecnologia Ltda.</h1>
        <h3>Gestão de Fornecedores</h3>
    </header>

    <nav>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Cadastro de novos fornecedores</h2>
            <form action="">
                <table border="0">
                    <tr>
                        <td><label for="empresa">Nome da Empresa:</label></td>
                        <td>
                            <input 
                                type="text" 
                                id="empresa" 
                                name="empresa" 
                                required 
                                placeholder="Nome Fantasia ou Razão"
                            />
                        </td>
                    </tr>

                    <tr>
                        <td><label for="cnpj">CNPJ (somente números):</label></td>
                        <td>
                            <input 
                                type="number" 
                                id="cnpj" 
                                name="cnpj" 
                                required 
                                placeholder="Digite apenas os 14 números"
                            />
                        </td>
                    </tr>

                    <tr>
                        <td><label for="tipo">Tipo de Produto:</label></td>
                        <td>
                            <input 
                                type="text" 
                                id="tipo" 
                                name="tipo" 
                                required 
                                placeholder="Ex: Hardware, Software"
                            />
                        </td>
                    </tr>

                    <tr>
                        <td><label for="email">E-mail Comercial:</label></td>
                        <td>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                required 
                                placeholder="fornecedor@email.com"
                            />
                        </td>
                    </tr>

                    <tr>
                        <td><label for="tel">Telefone:</label></td>
                        <td>
                            <input 
                                type="tel" 
                                id="tel" 
                                name="tel" 
                                required 
                                placeholder="(00) 00000-0000"
                            />
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2">
                            <br />
                            <button type="submit">Cadastrar Fornecedor</button>
                        </td>
                    </tr>
                </table>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SN Tecnologia Ltda. - Contato: sntechnologia@gmail.com</p>
    </footer>
</body>
</html>
